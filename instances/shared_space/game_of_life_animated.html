<!DOCTYPE html>
<html>
<head>
    <title>Game of Life</title>
    <style>
        body {
            font-family: monospace;
            white-space: pre;
        }
        .cell {
            width: 15px;
            height: 15px;
            border: 1px solid #ccc;
            display: inline-block;
            vertical-align: top;
        }
        .live {
            background-color: black;
        }
        .dead {
            background-color: white;
        }
        table {
            border-collapse: collapse;
        }
        td {
            width: 10px;
            height: 10px;
            border: 1px solid #eee;
        }
        .live-cell {
            background-color: black;
        }
    </style>
</head>
<body>
    <h1>Conway's Game of Life</h1>
    <div id="game-grid"></div>

    <script>
        function createGrid(rows, cols) {
            let table = '<table>';
            for (let i = 0; i < rows; i++) {
                table += '<tr>';
                for (let j = 0; j < cols; j++) {
                    table += `<td id="cell-${i}-${j}" class="dead-cell"></td>`;
                }
                table += '</tr>';
            }
            table += '</table>';
            document.getElementById('game-grid').innerHTML = table;
        }

        function updateGridDisplay(gridString) {
            const rows = gridString.trim().split('\n');
            rows.forEach((row, rIdx) => {
                row.split('').forEach((cellChar, cIdx) => {
                    const cellElement = document.getElementById(`cell-${rIdx}-${cIdx}`);
                    if (cellElement) {
                        if (cellChar === '#') {
                            cellElement.classList.remove('dead-cell');
                            cellElement.classList.add('live-cell');
                        } else {
                            cellElement.classList.remove('live-cell');
                            cellElement.classList.add('dead-cell');
                        }
                    }
                });
            });
        }

        // Example usage (will be replaced by dynamic loading later)
        createGrid(20, 40);
        let allGenerations = [];
        let currentGeneration = 0;
        let intervalId;
        let animationSpeed = 200; // Milliseconds per generation

        function loadGenerations() {
            fetch('generations.json')
                .then(response => response.json())
                .then(data => {
                    allGenerations = data;
                    if (allGenerations.length > 0) {
                        updateGridDisplay(allGenerations[currentGeneration].join('\n'));
                    }
                })
                .catch(error => console.error('Error loading generations:', error));
        }

        function playAnimation() {
            if (intervalId) return; // Already playing
            intervalId = setInterval(() => {
                currentGeneration++;
                if (currentGeneration < allGenerations.length) {
                    updateGridDisplay(allGenerations[currentGeneration].join('\n'));
                } else {
                    pauseAnimation();
                    currentGeneration = 0; // Loop back to start
                    updateGridDisplay(allGenerations[currentGeneration].join('\n'));
                }
            }, animationSpeed);
        }

        function pauseAnimation() {
            clearInterval(intervalId);
            intervalId = null;
        }

        function setSpeed(speed) {
            animationSpeed = 1000 / speed; // Convert Hz to ms
            if (intervalId) {
                pauseAnimation();
                playAnimation();
            }
        }

        // Initial load
        window.onload = () => {
            loadGenerations();
            playAnimation(); // Start playing automatically on load
        };
    </script>
    <div style="margin-top: 20px;">
        <button onclick="playAnimation()">Play</button>
        <button onclick="pauseAnimation()">Pause</button>
        Speed: <input type="range" min="1" max="10" value="5" onchange="setSpeed(this.value)">
    </div>
</body>
</html>
