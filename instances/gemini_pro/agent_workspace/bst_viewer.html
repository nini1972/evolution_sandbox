
<!DOCTYPE html>
<html>
<head>
    <title>BST Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; }
        canvas { display: block; background-color: white; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <canvas id="bstCanvas"></canvas>

    <div style="margin-top: 10px;">
        <input type="number" id="nodeValueInput" placeholder="Enter value">
        <button id="insertButton">Insert Node</button>
        <button id="deleteButton">Delete Node</button>
    </div>

    <script>
        const canvas = document.getElementById('bstCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Node properties
        const NODE_RADIUS = 20;
        const NODE_COLOR = '#3498db';
        const TEXT_COLOR = '#ffffff';
        const FONT = '14px Arial';

        // Tree structure (example for now)
        // const tree = {
        //     value: 50,
        //     left: {
        //         value: 30,
        //         left: { value: 20 },
        //         right: { value: 40 }
        //     },
        //     right: {
        //         value: 70,
        //         left: { value: 60 },
        //         right: { value: 80 }
        //     }
        // };

        // Function to draw a node
        function drawNode(x, y, value) {
            ctx.beginPath();
            ctx.arc(x, y, NODE_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = NODE_COLOR;
            ctx.fill();
            ctx.strokeStyle = '#2980b9';
            ctx.stroke();

            ctx.fillStyle = TEXT_COLOR;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = FONT;
            ctx.fillText(value, x, y);
        }

        // Function to draw a line between nodes
        function drawLine(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Function to draw the entire tree
        function drawTree(node) {
            if (!node) return;

            // Draw line to children first to ensure nodes are on top
            if (node.left) {
                drawLine(node.x, node.y + NODE_RADIUS, node.left.x, node.left.y - NODE_RADIUS);
                drawTree(node.left);
            }

            if (node.right){
                drawLine(node.x, node.y + NODE_RADIUS, node.right.x, node.right.y - NODE_RADIUS);
                drawTree(node.right);
            }
            
            drawNode(node.x, node.y, node.value);
        }

        // Node class
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
                this.x = 0; // Added for layout
                this.y = 0; // Added for layout
            }
        }

        let root = null; // Our BST root
        let currentX = 0; // For layout calculation
        const NODE_HORIZONTAL_SPACING = NODE_RADIUS * 3; // Minimum spacing between nodes horizontally
        const NODE_VERTICAL_SPACING = 70; // Spacing between levels

        // Function to calculate node positions recursively
        function calculateNodePositions(node, depth) {
            if (node === null) {
                return;
            }

            calculateNodePositions(node.left, depth + 1);

            // Set x and y for the current node using in-order traversal
            node.x = currentX;
            node.y = depth * NODE_VERTICAL_SPACING + 50; // 50 is initial offset from top
            currentX += NODE_HORIZONTAL_SPACING;

            calculateNodePositions(node.right, depth + 1);
        }

        // Function to insert a node
        function insert(node, newValue) {
            if (node === null) {
                return new Node(newValue);
            }

            if (newValue < node.value) {
                node.left = insert(node.left, newValue);
            } else if (newValue > node.value) {
                node.right = insert(node.right, newValue);
            }
            return node;
        }

        // Function to handle insertion from UI
        function insertNode() {
            const value = parseInt(nodeValueInput.value);
            if (isNaN(value)) return;

            if (root === null) {
                root = new Node(value);
            } else {
                insert(root, value);
            }
            nodeValueInput.value = '';
            redrawTree();
        }

        // Function to find the inorder successor (for deletion)
        function findMinNode(node) {
            while (node.left !== null) {
                node = node.left;
            }
            return node;
        }

        // Function to delete a node
        function deleteR(node, key) {
            if (node === null) {
                return null;
            }

            if (key < node.value) {
                node.left = deleteR(node.left, key);
            } else if (key > node.value) {
                node.right = deleteR(node.right, key);
            } else {
                // Node with only one child or no child
                if (node.left === null) {
                    return node.right;
                } else if (node.right === null) {
                    return node.left;
                }

                // Node with two children: Get the inorder successor (smallest in the right subtree)
                const temp = findMinNode(node.right);
                node.value = temp.value;
                node.right = deleteR(node.right, temp.value);
            }
            return node;
        }

        // Function to handle deletion from UI
        function deleteNode() {
            const value = parseInt(nodeValueInput.value);
            if (isNaN(value)) return;
            
            root = deleteR(root, value);
            nodeValueInput.value = '';
            redrawTree();
        }

        // Function to clear and redraw the tree
        function redrawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (root !== null) {
                currentX = 0; // Reset for new layout calculation
                calculateNodePositions(root, 0); // Calculate all node positions

                // Determine tree width and calculate offset for centering
                const treeWidth = currentX; // last currentX is the effective width
                const minCanvasWidth = 600; // Minimum canvas width
                canvas.width = Math.max(minCanvasWidth, treeWidth + NODE_HORIZONTAL_SPACING );
                
                const offsetX = (canvas.width - treeWidth) / 2; 

                // Apply offset to all nodes' x coordinates
                applyOffsetXToNodes(root, offsetX);

                drawTree(root); // Draw based on calculated positions
            }
        }

        // Helper to apply calculated offset to all nodes
        function applyOffsetXToNodes(node, offsetX) {
            if (node === null) {
                return;
            }
            node.x += offsetX;
            applyOffsetXToNodes(node.left, offsetX);
            applyOffsetXToNodes(node.right, offsetX);
        }

        // Helper to get max depth of the tree for spacing (no longer strictly needed for layout, but can be kept for other purposes)
        function getMaxDepth(node) {
            if (node === null) {
                return 0;
            }
            const leftDepth = getMaxDepth(node.left);
            const rightDepth = getMaxDepth(node.right);
            return Math.max(leftDepth, rightDepth) + 1;
        }

        // Initial draw
        redrawTree();

        // Event Listeners for buttons
        const nodeValueInput = document.getElementById('nodeValueInput');
        const insertButton = document.getElementById('insertButton');
        const deleteButton = document.getElementById('deleteButton');

        insertButton.addEventListener('click', insertNode);
        deleteButton.addEventListener('click', deleteNode);



    </script>
</body>
</html>
