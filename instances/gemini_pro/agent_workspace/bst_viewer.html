
<!DOCTYPE html>
<html>
<head>
    <title>BST Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; }
        canvas { display: block; background-color: white; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <canvas id="bstCanvas"></canvas>

    <div style="position: absolute; top: 10px; left: 10px; background: white; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <input type="number" id="nodeValue" placeholder="Enter value" />
        <button onclick="insertNode()">Insert</button>
        <button onclick="deleteNode()">Delete</button>
    </div>

    <script>
        const canvas = document.getElementById('bstCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Node properties
        const NODE_RADIUS = 20;
        const NODE_COLOR = '#3498db';
        const TEXT_COLOR = '#ffffff';
        const FONT = '14px Arial';

        // Tree structure (example for now)
        // const tree = {
        //     value: 50,
        //     left: {
        //         value: 30,
        //         left: { value: 20 },
        //         right: { value: 40 }
        //     },
        //     right: {
        //         value: 70,
        //         left: { value: 60 },
        //         right: { value: 80 }
        //     }
        // };

        // Function to draw a node
        function drawNode(x, y, value) {
            ctx.beginPath();
            ctx.arc(x, y, NODE_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = NODE_COLOR;
            ctx.fill();
            ctx.strokeStyle = '#2980b9';
            ctx.stroke();

            ctx.fillStyle = TEXT_COLOR;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = FONT;
            ctx.fillText(value, x, y);
        }

        // Function to draw a line between nodes
        function drawLine(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Function to draw the entire tree
        function drawTree(node, x, y, hOffset, depth, maxDepth) {
            if (!node) return;

            const verticalSpacing = 70; // Constant vertical spacing

            // Recalculate horizontal offset based on depth to avoid overlaps
            // A simple approach: reduce hOffset more aggressively for deeper levels
            const newHOffset = hOffset * ( (maxDepth - depth) / maxDepth );
            const nextY = y + verticalSpacing;

            // Draw line to children first to ensure nodes are on top
            if (node.left) {
                const newX = x - newHOffset;
                drawLine(x, y + NODE_RADIUS, newX, nextY - NODE_RADIUS);
                drawTree(node.left, newX, nextY, newHOffset, depth + 1, maxDepth);
            }

            if (node.right){
                const newX = x + newHOffset;
                drawLine(x, y + NODE_RADIUS, newX, nextY - NODE_RADIUS);
                drawTree(node.right, newX, nextY, newHOffset, depth + 1, maxDepth);
            }
            
            drawNode(x, y, node.value);
        }

        // Node class
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
                this.x = 0; // Added for layout
                this.y = 0; // Added for layout
            }
        }

        let root = null; // Our BST root

        // Function to insert a node
        function insert(node, newValue) {
            if (node === null) {
                return new Node(newValue);
            }

            if (newValue < node.value) {
                node.left = insert(node.left, newValue);
            } else if (newValue > node.value) {
                node.right = insert(node.right, newValue);
            }
            return node;
        }

        // Function to handle insertion from UI
        function insertNode() {
            const nodeValueInput = document.getElementById('nodeValue');
            const value = parseInt(nodeValueInput.value);
            if (isNaN(value)) return;

            if (root === null) {
                root = new Node(value);
            } else {
                insert(root, value);
            }
            nodeValueInput.value = '';
            redrawTree();
        }

        // Function to find the inorder successor (for deletion)
        function findMinNode(node) {
            while (node.left !== null) {
                node = node.left;
            }
            return node;
        }

        // Function to delete a node
        function deleteR(node, key) {
            if (node === null) {
                return null;
            }

            if (key < node.value) {
                node.left = deleteR(node.left, key);
            } else if (key > node.value) {
                node.right = deleteR(node.right, key);
            } else {
                // Node with only one child or no child
                if (node.left === null) {
                    return node.right;
                } else if (node.right === null) {
                    return node.left;
                }

                // Node with two children: Get the inorder successor (smallest in the right subtree)
                const temp = findMinNode(node.right);
                node.value = temp.value;
                node.right = deleteR(node.right, temp.value);
            }
            return node;
        }

        // Function to handle deletion from UI
        function deleteNode() {
            const nodeValueInput = document.getElementById('nodeValue');
            const value = parseInt(nodeValueInput.value);
            if (isNaN(value)) return;
            
            root = deleteR(root, value);
            nodeValueInput.value = '';
            redrawTree();
        }

        // Function to clear and redraw the tree
        function redrawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (root !== null) {
                const maxDepth = getMaxDepth(root);
                // Starting x, y, and initial horizontal offset
                drawTree(root, canvas.width / 2, 50, canvas.width / 4, 0, maxDepth);
            }
        }

        // Helper to get max depth of the tree for spacing
        function getMaxDepth(node) {
            if (node === null) {
                return 0;
            }
            const leftDepth = getMaxDepth(node.left);
            const rightDepth = getMaxDepth(node.right);
            return Math.max(leftDepth, rightDepth) + 1;
        }

        // Initial draw
        redrawTree();

    </script>
</body>
</html>
