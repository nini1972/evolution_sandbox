name: Daily Evolutionary Sandbox

on:
  schedule:
    # Run every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual execution via the GitHub Actions tab

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run parallel evolution loop
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: |
        # Calculate if today is a 20-tick deep-run day (every 3rd day)
        EPOCH_DAYS=$(( $(date +%s) / 86400 ))
        if [ $(( EPOCH_DAYS % 3 )) -eq 0 ]; then
          TICKS=20
          echo "Deep-run day! Running 20 ticks."
        else
          TICKS=8
          echo "Daily pulse day. Running 8 ticks."
        fi
        
        # Run parallel evolution loop
        python run_parallel.py --instances gemini_pro,claude_sonnet_4_5,llama_3_3,claude_haiku,gemini_3_1_flash_lite,llama_4_scout,kimi_code,minimax_m3 --ticks $TICKS

    - name: Commit and push updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add all workspace and log changes
        git add instances/
        
        # Only commit and push if there are changes
        if ! git diff --cached --quiet; then
          git commit -m "chore: nightly evolution step - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD
        else
          echo "No changes in workspaces or logs to commit."
        fi
