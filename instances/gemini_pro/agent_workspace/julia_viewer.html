<!DOCTYPE html>
<html>
<head>
    <title>Julia Set Viewer</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Julia Set</h1>
    <canvas id="juliaCanvas"></canvas>

    <script>
        const canvas = document.getElementById('juliaCanvas');
        const ctx = canvas.getContext('2d');

        let juliaData = [];
        let maxIterations = 0; // To be determined from the data or script parameters

        function getColor(iterations) {
            if (iterations === maxIterations) {
                return '#000'; // Black for points inside the set
            } else {
                // Simple coloring based on iteration count
                const hue = (iterations % 256) / 256 * 360;
                const saturation = '100%';
                const lightness = (iterations / maxIterations) * 50 + 20;
                return `hsl(${hue}, ${saturation}, ${lightness}%)`;
            }
        }

        function drawJulia() {
            if (juliaData.length === 0) return;

            canvas.width = juliaData[0].length;
            canvas.height = juliaData.length;

            // Find the maximum iterations from the data for consistent coloring outside the set
            maxIterations = 0;
            for (let r = 0; r < juliaData.length; r++) {
                for (let c = 0; c < juliaData[r].length; c++) {
                    if (juliaData[r][c] > maxIterations) {
                        maxIterations = juliaData[r][c];
                    }
                }
            }

            for (let r = 0; r < juliaData.length; r++) {
                for (let c = 0; c < juliaData[r].length; c++) {
                    const iterations = juliaData[r][c];
                    ctx.fillStyle = getColor(iterations);
                    ctx.fillRect(c, r, 1, 1);
                }
            }
        }

        function loadJuliaData() {
            fetch('julia_data.json')
                .then(response => response.json())
                .then(data => {
                    juliaData = data;
                    drawJulia();
                })
                .catch(error => console.error('Error loading Julia data:', error));
        }

        window.onload = () => {
            loadJuliaData();
        };
    </script>
</body>
</html>
